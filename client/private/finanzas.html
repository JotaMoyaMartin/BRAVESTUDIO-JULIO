<head>

<title>BRAVECONTENT — Finanzas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --sheet:#ffffff;
  --border:#e2e2dc;
  --border2:#efefea;
  --text:#1a1a1a;
  --muted:#7a7a7a;
  --muted2:#bbb;
  --accent:#7A1832;
  --accent-dark:#591427;
  --accent-light:#A04060;
  --cream:#FFFDF5;
  --buttermilk:#FFF1B5;
  --green:#16a34a;
  --red:#dc2626;
  --orange:#ea580c;
  --yellow-bg:#fffbeb;
  --nav-h:50px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--text);font-family:'Poppins','Inter','Segoe UI',system-ui,sans-serif;font-size:13px;}

/* ── NAV ── */
.topnav{
  height:var(--nav-h);background:#fff;border-bottom:1px solid #e5e5e5;
  display:flex;align-items:center;padding:0 20px;gap:4px;
  position:sticky;top:0;z-index:200;box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.brand{font-size:15px;font-weight:900;color:#1a1a1a;letter-spacing:-.4px;margin-right:10px;}
.brand span{color:var(--accent);}
.nav-sep{width:1px;height:18px;background:#e5e5e5;margin:0 8px;}
.nbtn{padding:6px 13px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;color:#666;border:none;background:none;transition:all .14s;}
.nbtn:hover{color:#1a1a1a;background:#f3f3f3;}
.nbtn.active{color:var(--accent);background:#eef2ff;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.save-btn{padding:7px 16px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;color:#fff;background:var(--accent);border:none;transition:background .14s;}
.save-btn:hover{background:var(--accent-dark);}
.saved-lbl{font-size:11px;color:#16a34a;font-weight:600;}

/* ── RANGE STRIP ── */
.range-strip{
  background:#fff;border-bottom:1px solid #e5e5e5;
  padding:8px 20px;display:flex;align-items:center;gap:8px;
  position:sticky;top:var(--nav-h);z-index:190;
}
.range-strip label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.6px;margin-right:4px;}
.rtab{padding:5px 13px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;
  color:#666;border:1px solid #e5e5e5;background:#fff;transition:all .14s;}
.rtab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.range-strip .sep{flex:1;}
.info-pill{font-size:11px;color:#888;background:#f3f3f3;border-radius:5px;padding:3px 10px;}

/* ── PAGES ── */
.page{display:none;}
.page.active{display:block;}

/* ══ SHEET ══ */
.sheet-wrap{overflow:auto;height:calc(100vh - var(--nav-h) - 41px);}
table.sheet{border-collapse:collapse;min-width:max-content;}

/* sticky row/col headers */
.sh-corner{position:sticky;left:0;top:0;z-index:20;background:#f7f7f5;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.col-hdr{position:sticky;top:0;z-index:10;background:#f7f7f5;text-align:center;
  font-size:10px;font-weight:600;color:#aaa;padding:2px;
  border-bottom:1px solid var(--border);border-right:1px solid var(--border2);}
.row-num{position:sticky;left:0;z-index:5;background:#f7f7f5;text-align:center;
  font-size:10px;color:#ccc;padding:0 4px;width:26px;min-width:26px;
  border-right:1px solid var(--border);border-bottom:1px solid var(--border2);}

/* sticky left cols */
.sc-a{position:sticky;left:26px;z-index:4;background:inherit;}
.sc-b{position:sticky;left:136px;z-index:4;background:inherit;}
.sc-c{position:sticky;left:226px;z-index:4;background:inherit;border-right:2px solid var(--border) !important;}

/* Base cell */
td{border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);padding:0;white-space:nowrap;vertical-align:middle;}
.cell{display:block;width:100%;min-height:22px;padding:3px 7px;cursor:cell;}
.c-r{text-align:right;}
.c-b{font-weight:700;}
.c-it{font-style:italic;}
.c-sm{font-size:11px;}
.c-grey{color:var(--muted);}
.c-grey2{color:var(--muted2);}

/* Row palettes — same feel as Google Sheets */
.rw-white   {background:#fff;}
.rw-factu   {background:#fff7ed;}   /* naranja muy suave */
.rw-brv     {background:#fef9ec;}   /* bravecontent ingresos */
.rw-skool   {background:#eff6ff;}   /* azul muy suave */
.rw-clients {background:#f7fdf7;}   /* verde pálido */
.rw-gastos  {background:#fff1f1;}   /* rojo suave */
.rw-margen  {background:#f0fdf4;}   /* verde */
.rw-resto   {background:#fffbeb;}   /* amarillo */
.rw-reparto {background:#faf5ff;}   /* violeta */
.rw-total   {background:#eff6ff;font-weight:700;}  /* total con skool */
.rw-svc-hdr {background:#fff5f7;}   /* SERVICIO header */
.rw-client  {background:#fff;}
.rw-sep     {background:#f8f8f6;height:6px;}
.rw-inactive td{opacity:.55;}

/* Month highlight */
.cur-month{background:#fffce6 !important;}

/* Focused cell */
td.focused{outline:2px solid var(--accent);outline-offset:-2px;z-index:6;}
.cell-inp{
  position:absolute;inset:0;border:none;outline:none;
  background:#fffce6;padding:3px 7px;
  font-size:13px;font-family:inherit;z-index:30;
}

/* Color helpers */
.col-purple{color:var(--accent);font-weight:700;}
.col-green{color:#16a34a;}
.col-red{color:#dc2626;}
.col-orange{color:#ea580c;}
.col-blue{color:#2563eb;}
.col-skool{color:#2563eb;font-weight:700;}

/* ══ DASHBOARD ══ */
.dash-wrap{padding:24px;overflow-y:auto;height:calc(100vh - var(--nav-h));}
.kpi-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:22px;}
.kpi{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:16px 20px;min-width:155px;flex:1;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.kpi-lbl{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;font-weight:700;}
.kpi-val{font-size:24px;font-weight:800;}
.kpi-d{font-size:11px;margin-top:4px;}
.dash-grid{display:grid;grid-template-columns:3fr 2fr;gap:16px;margin-bottom:20px;}
.dcard{background:#fff;border:1px solid #e5e5e5;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.dcard-head{padding:12px 16px;border-bottom:1px solid #f0f0f0;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;justify-content:space-between;}
.dcard-body{padding:16px;}
.ch-wrap{position:relative;height:220px;}
.range-tabs{display:flex;gap:3px;}

/* Table styles (shared) */
.t-wrap{background:#fff;border:1px solid #e5e5e5;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);}
table.dt{width:100%;border-collapse:collapse;}
table.dt th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.6px;background:#fafaf8;border-bottom:1px solid #eee;}
table.dt th.r{text-align:right;}
table.dt td{padding:9px 12px;border-bottom:1px solid #f5f5f5;font-size:13px;}
table.dt td.r{text-align:right;}
table.dt tr:hover td{background:#fafaf8;}
table.dt tr.total-r td{background:#f5f5ff;font-weight:700;}

/* ══ CLIENTES PAGE ══ */
.cp-wrap{padding:24px;overflow-y:auto;height:calc(100vh - var(--nav-h));}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:none;align-items:center;justify-content:center;}
.mbg.open{display:flex;}
.mbox{background:#fff;border-radius:14px;padding:24px;width:500px;max-width:96vw;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.mbox h2{font-size:16px;font-weight:800;margin-bottom:18px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;}
.fi{border:1px solid #ddd;border-radius:7px;padding:8px 11px;font-size:13px;font-family:inherit;}
.fi:focus{outline:none;border-color:var(--accent);}
.mfooter{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid #f0f0f0;}
.btn{padding:8px 18px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;border:none;}
.btn-p{background:var(--accent);color:#fff;}
.btn-g{background:#f3f3f3;color:#666;}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-danger{background:#fff1f1;color:#dc2626;}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#4ade80;
  padding:10px 18px;border-radius:8px;font-weight:700;font-size:13px;z-index:999;
  transform:translateY(50px);opacity:0;transition:all .25s;}
.toast.show{transform:translateY(0);opacity:1;}

/* add-col btn */
.add-col-th{cursor:pointer;color:var(--accent);font-size:15px;text-align:center;padding:4px 8px;}
.add-col-th:hover{background:#eef2ff;}
</style>
</head>

</div>

<!-- ══ SHEET PAGE ══ -->
<div class="page active" id="page-sheet">

    <label>Mostrar:</label>
    <button class="rtab" onclick="setSheetRange(3,this)">3 meses</button>

  </div>
  <div class="sheet-wrap" id="sheetWrap">
    <table class="sheet" id="mainSheet">
      <colgroup id="cg"></colgroup>
      <thead id="sh-head"></thead>
      <tbody id="sh-body"></tbody>
    </table>
  </div>
</div>

<!-- ══ DASHBOARD PAGE ══ -->
<div class="page" id="page-dashboard">
<div class="dash-wrap">

          <button class="rtab" onclick="setDashRange(0,this)">Todo</button>
        </div>
      </div>
      <div class="dcard-body"><div class="ch-wrap"><canvas id="chartBar"></canvas></div></div>
    </div>
    <div class="dcard">
      <div class="dcard-head">Margen neto %</div>
      <div class="dcard-body"><div class="ch-wrap"><canvas id="chartLine"></canvas></div></div>
    </div>
  </div>
  <div class="t-wrap">
    <table class="dt" id="dashDt">
      <thead><tr id="dashTH"></tr></thead>
      <tbody id="dashTB"></tbody>
    </table>
  </div>
</div>
</div>

<!-- ══ CLIENTS PAGE ══ -->
<div class="page" id="page-clients-pg">
<div class="cp-wrap">
  <div class="kpi-row" id="cliKpi"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">

    <button class="btn btn-p" onclick="openClientModal()">+ Añadir cliente</button>
  </div>
  <div class="t-wrap">
    <table class="dt">
      <thead><tr>
        <th>Nombre</th><th>Ciudad</th><th>Servicio</th>
        <th class="r">Fee / mes</th><th>Desde</th><th>Estado</th><th></th>
      </tr></thead>
      <tbody id="cliBody"></tbody>
    </table>
  </div>
</div>
</div>

<!-- CLIENT MODAL -->
<div class="mbg" id="clientModal">
  <div class="mbox">

    <div class="fg2">

      <div class="fg"><label class="fl">Estado</label>
        <select class="fi" id="cm-active"><option value="true">Activo ✓</option><option value="false">Inactivo</option></select></div>
    </div>
    <div class="mfooter">
      <button class="btn btn-g" onclick="closeClientModal()">Cancelar</button>
      <button class="btn btn-p" onclick="saveClient()">Guardar cliente</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// STATE
// ═══════════════════════════════════════════════════════
let DB = {months:[], clients:[], fees:{}};
let sheetRange = 0, dashRange = 6;
let editingCid = null;
let charts = {};
let activePage = 'sheet';

function loadDB() {
  try {
    const s = localStorage.getItem('bc_v4');
    if (s) DB = JSON.parse(s);
    else { DB = {months:JSON.parse(JSON.stringify(DEF_MONTHS)), clients:JSON.parse(JSON.stringify(DEF_CLIENTS)), fees:JSON.parse(JSON.stringify(INIT_FEES))}; }
  } catch(e) {
    DB = {months:JSON.parse(JSON.stringify(DEF_MONTHS)), clients:JSON.parse(JSON.stringify(DEF_CLIENTS)), fees:JSON.parse(JSON.stringify(INIT_FEES))};
  }
}

function saveDB() {
  localStorage.setItem('bc_v4', JSON.stringify(DB));
  stamp('Guardado ' + new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}));
  showToast('✓ Guardado');
}

function stamp(t) { document.getElementById('savedLbl').textContent = t; }

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function n(v){ return isNaN(+v) ? 0 : +v; }
function pct(rev,exp){ return rev>0 ? (rev-exp)/rev*100 : 0; }
function fmtN(v,d=0){ return v===''||v==null?'':Number(v).toLocaleString('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtP(v){ return v.toFixed(1)+'%'; }
function mlbl(id){ if(!id)return''; const [y,m]=id.split('-'); const ns=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']; return ns[+m]+' '+y.slice(2); }
function curMid(){ return new Date().toISOString().slice(0,7); }
function sorted(){ return [...DB.months].sort((a,b)=>a.id.localeCompare(b.id)); }
function visMonths(){
  const s = sorted().filter(m=>m.brv>0||m.skool>0||m.exp>0);
  if(!sheetRange||sheetRange>=s.length) return s;
  return s.slice(-sheetRange);
}

// ═══════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════
function showPage(id, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  activePage=id;
  if(id==='sheet') renderSheet();
  if(id==='dashboard') renderDashboard();
  if(id==='clients-pg') renderCliPage();
}

// ═══════════════════════════════════════════════════════
// SHEET RANGE
// ═══════════════════════════════════════════════════════
function setSheetRange(n, el){
  sheetRange=n;
  document.querySelectorAll('#page-sheet .rtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderSheet();
}

// ═══════════════════════════════════════════════════════
// RENDER SHEET
// ═══════════════════════════════════════════════════════
function renderSheet(){
  const months = visMonths();
  const curId = curMid();
  const N = months.length;

  document.getElementById('sheetInfo').textContent =
    `${months[0]?mlbl(months[0].id):'—'} → ${months[N-1]?mlbl(months[N-1].id):'—'} (${N} meses)`;

  // Colgroup
  const cg = document.getElementById('cg');
  cg.innerHTML = '<col style="width:26px"><col style="width:110px"><col style="width:90px"><col style="width:195px"><col style="width:36px"><col style="width:30px">'

  const colLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').concat(['AA','AB','AC','AD','AE','AF','AG','AH','AI','AJ','AK','AL']);

  let h1='<tr>';
  h1+=`<th class="col-hdr sh-corner" style="width:26px"></th>`;
  h1+=`<th class="col-hdr" style="position:sticky;left:26px;z-index:12">A</th>`;
  h1+=`<th class="col-hdr" style="position:sticky;left:136px;z-index:12">B</th>`;
  h1+=`<th class="col-hdr" style="position:sticky;left:226px;z-index:12">C</th>`;
  h1+=`<th class="col-hdr">D</th><th class="col-hdr">E</th>`;
  months.forEach((m,i)=>{ h1+=`<th class="col-hdr${m.id===curId?' cur-month':''}">${colLetters[i+5]||'?'}</th>`; });

  // Month name row
  let h2='<tr>';
  h2+=`<th class="col-hdr sh-corner" style="width:26px">1</th>`;
  h2+=`<th class="col-hdr" style="position:sticky;left:26px;z-index:12;font-size:10px;color:#bbb">Ciudad</th>`;
  h2+=`<th class="col-hdr" style="position:sticky;left:136px;z-index:12;font-size:10px;color:#bbb">Servicio</th>`;
  h2+=`<th class="col-hdr" style="position:sticky;left:226px;z-index:12;font-size:10px;color:#bbb">Concepto</th>`;
  h2+=`<th class="col-hdr" style="font-size:10px;color:#bbb">nº</th><th class="col-hdr" style="font-size:10px;color:#bbb">p</th>`;
  months.forEach((m,i)=>{
    const yr = (i===0||months[i].id.slice(0,4)!==months[i-1]?.id.slice(0,4)) ? `<div style="font-size:9px;font-weight:400;color:#bbb;line-height:1">${m.id.slice(0,4)}</div>` : '';
    h2+=`<th class="col-hdr${m.id===curId?' cur-month':''}" style="font-size:11px;font-weight:700;padding:3px 2px">${yr}${m.lbl}</th>`;
  });
  h2+=`<th class="col-hdr"></th></tr>`;
  thead.innerHTML = h1+h2;

  // TBODY
  const tbody = document.getElementById('sh-body');
  let html='';
  let rn=2;

  // Helper: empty separator
  const sep = (h=6) => {
    rn++;
    return `<tr class="rw-sep" style="height:${h}px"><td class="row-num">${rn}</td><td class="sc-a"></td><td class="sc-b"></td><td class="sc-c"></td><td></td><td></td>${months.map(()=>'<td></td>').join('')}<td></td></tr>`;
  };

  // Helper: summary row
  const sumRow = (cls, lc, lb, la, vals, opts={}) => {
    rn++;
    let r=`<tr class="${cls}"><td class="row-num">${rn}</td>`;
    r+=`<td class="sc-a"><span class="cell c-grey2 c-sm">${la||''}</span></td>`;
    r+=`<td class="sc-b"><span class="cell c-grey2 c-sm">${lb||''}</span></td>`;
    r+=`<td class="sc-c"><span class="cell${opts.bold?' c-b':''}">${lc||''}</span></td>`;
    r+=`<td><span class="cell"></span></td><td><span class="cell"></span></td>`;
    vals.forEach((v,i)=>{
      const mid=months[i].id;
      const isCur=mid===curId;
      const empty=!v&&v!==0;
      let disp = empty?'' : (opts.pct ? fmtP(v) : fmtN(v));
      let color = '';
      if(opts.pct){ color=v>=50?'color:#16a34a':v>=40?'color:#ea580c':'color:#dc2626'; }
      if(opts.colorFn) color=opts.colorFn(v);
      if(opts.editable){
        r+=`<td class="${isCur?'cur-month':''}" onclick="editCell(this,'${mid}','${opts.field}',${n(v)})">
          <span class="cell c-r${opts.bold?' c-b':''}" style="${color}">${disp}</span></td>`;
      } else {
        r+=`<td class="${isCur?'cur-month':''}"><span class="cell c-r${opts.bold?' c-b':''}" style="${color}">${disp}</span></td>`;
      }
    });
    r+=`<td></td></tr>`;
    return r;
  };

  // ── Row 3: nota
  rn++; html+=`<tr class="rw-white"><td class="row-num">${rn}</td><td class="sc-a" colspan="5"><span class="cell c-grey c-it c-sm" style="padding:4px 8px">*cantidades sin impuestos añadidos</span></td>${months.map(()=>'<td></td>').join('')}<td></td></tr>`;
  html+=sep();

  // ── FACTURACIÓN TOTAL
  html+=sumRow('rw-factu','','','TOTAL FACTURACIÓN',
    months.map(m=>n(m.brv)+n(m.skool)), {bold:true});

  // ── BraveContent ingresos
  html+=sumRow('rw-brv','','','↳ BraveContent (redes)',
    months.map(m=>n(m.brv)), {editable:true,field:'brv',
    colorFn:v=>v>0?'color:#4f46e5;font-weight:600':''});

  // ── SKOOL ingresos
  html+=sumRow('rw-skool','','','↳ Skool',
    months.map(m=>n(m.skool)), {editable:true,field:'skool',
    colorFn:v=>v>0?'color:#2563eb;font-weight:600':''});

  html+=sep();

  // ── Clientes
  html+=sumRow('rw-clients','','','Clientes',
    months.map(m=>m.clients||0), {editable:true,field:'clients'});

  html+=sep();

  // ── GASTOS
  html+=sumRow('rw-gastos','','','GASTOS',
    months.map(m=>n(m.exp)), {bold:true,editable:true,field:'exp',
    colorFn:v=>v>0?'color:#dc2626':''});

  // ── MARGEN
  html+=sumRow('rw-margen','','','MARGEN',
    months.map(m=>pct(n(m.brv)+n(m.skool),n(m.exp))), {bold:true,pct:true});

  // ── RESTO (neto)
  html+=sumRow('rw-resto','','','RESTO',
    months.map(m=>n(m.brv)+n(m.skool)-n(m.exp)), {bold:true,
    colorFn:v=>v>0?'color:#16a34a;font-weight:700':'color:#dc2626;font-weight:700'});

  // ── Reparto
  html+=sumRow('rw-reparto','','','Reparto',
    months.map(m=>n(m.rep)||(Math.round((n(m.brv)+n(m.skool)-n(m.exp))*0.5))),
    {editable:true,field:'rep',colorFn:_=>'color:#7c3aed'});

  html+=sep(10);

  // ── SERVICIO HEADER
  rn++;
  html+=`<tr class="rw-svc-hdr">
    <td class="row-num">${rn}</td>
    <td class="sc-a"></td><td class="sc-b"></td>
    <td class="sc-c"><span class="cell c-b" style="padding:5px 7px">SERVICIO</span></td>
    <td></td><td></td>
    ${months.map(()=>'<td></td>').join('')}
    <td style="text-align:center"><button onclick="openClientModal()" style="background:#4f46e5;color:#fff;border:none;border-radius:4px;padding:2px 9px;cursor:pointer;font-size:11px;font-weight:700">+</button></td>
  </tr>`;

  // ── Clients — active first
  const sortedClients = [...DB.clients].sort((a,b)=>b.active-a.active||a.name.localeCompare(b.name));
  sortedClients.forEach(c=>{
    rn++;
    html+=`<tr class="rw-client${!c.active?' rw-inactive':''}" id="crow-${c.id}">`;
    html+=`<td class="row-num">${rn}</td>`;
    html+=`<td class="sc-a"><span class="cell c-grey c-sm">${c.city}</span></td>`;
    html+=`<td class="sc-b"><span class="cell c-grey c-sm">${c.service}</span></td>`;
    html+=`<td class="sc-c" ondblclick="openClientModal(${c.id})" title="Doble click para editar">
      <span class="cell${c.active?' c-b':''}">${c.name}</span></td>`;
    html+=`<td><span class="cell c-r c-grey2 c-sm"></span></td>`;
    html+=`<td><span class="cell c-grey2 c-sm c-sm" style="text-align:center">${!c.active?'x':''}</span></td>`;

    months.forEach(m=>{
      const isCur=m.id===curId;
      const key=`${c.id}_${m.id}`;
      let feeV = DB.fees[key]!==undefined ? DB.fees[key]
        : (c.active && m.id>=c.since ? c.fee : 0);
      const disp = feeV>0 ? fmtN(feeV) : '';
      const color = c.active&&feeV>0 ? 'color:#4f46e5' : 'color:#ccc';
      html+=`<td class="${isCur?'cur-month':''}" onclick="editFeeCell(this,'${c.id}','${m.id}',${feeV})">
        <span class="cell c-r" style="${color}">${disp}</span></td>`;
    });

    html+=`<td style="text-align:center">
      <button onclick="toggleActive(${c.id})" style="font-size:11px;padding:2px 6px;border:none;border-radius:4px;cursor:pointer;background:${c.active?'#fff1f1':'#f0fdf4'};color:${c.active?'#dc2626':'#16a34a'}">${c.active?'✕':'✓'}</button>
    </td>`;
    html+=`</tr>`;
  });

  tbody.innerHTML=html;

  // Scroll to rightmost (latest months)
  if(!sheetRange){
    setTimeout(()=>{
      const w=document.getElementById('sheetWrap');
      if(w) w.scrollLeft=Math.max(0,w.scrollWidth-w.clientWidth-80);
    },80);
  }
}

// ═══════════════════════════════════════════════════════
// INLINE EDIT — summary
// ═══════════════════════════════════════════════════════
function editCell(td, mid, field, cur){
  if(td.querySelector('input')) return;
  const m=DB.months.find(x=>x.id===mid); if(!m) return;
  td.classList.add('focused');
  const inp=document.createElement('input');
  inp.className='cell-inp'; inp.type='number'; inp.value=cur||0; inp.style.textAlign='right';
  td.style.position='relative'; td.appendChild(inp);
  inp.focus(); inp.select();
  const commit=()=>{
    m[field]=parseFloat(inp.value)||0;
    td.classList.remove('focused'); inp.remove();
    localStorage.setItem('bc_v4',JSON.stringify(DB));
    stamp('Auto-guardado'); renderSheet();
  };
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();commit();}
    if(e.key==='Escape'){td.classList.remove('focused');inp.remove();}
  });
}

// ═══════════════════════════════════════════════════════
// INLINE EDIT — client fee
// ═══════════════════════════════════════════════════════
function editFeeCell(td, cid, mid, cur){
  if(td.querySelector('input')) return;
  td.classList.add('focused');
  const inp=document.createElement('input');
  inp.className='cell-inp'; inp.type='number'; inp.value=cur||0; inp.style.textAlign='right';
  td.style.position='relative'; td.appendChild(inp);
  inp.focus(); inp.select();
  const commit=()=>{
    const v=parseFloat(inp.value)||0;
    DB.fees[`${cid}_${mid}`]=v;
    td.classList.remove('focused'); inp.remove();
    localStorage.setItem('bc_v4',JSON.stringify(DB));
    stamp('Auto-guardado'); renderSheet();
  };
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();commit();}
    if(e.key==='Escape'){td.classList.remove('focused');inp.remove();}
  });
}

function toggleActive(id){
  const c=DB.clients.find(x=>x.id===id); if(!c) return;
  c.active=!c.active; saveDB(); renderSheet();
}

// ═══════════════════════════════════════════════════════
// ADD MONTH MODAL
// ═══════════════════════════════════════════════════════
function openAddMonthModal(){
  const mo=prompt('Mes a añadir (AAAA-MM):');
  if(!mo||!/^\d{4}-\d{2}$/.test(mo)){if(mo)alert('Formato incorrecto. Usa AAAA-MM');return;}
  if(DB.months.find(m=>m.id===mo)){alert('Ese mes ya existe');return;}
  const ns=['','ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
  DB.months.push({id:mo,lbl:ns[+mo.split('-')[1]]||mo,brv:0,skool:0,exp:0,clients:0,rep:0});
  saveDB(); renderSheet();
}

// ═══════════════════════════════════════════════════════
// CLIENT MODAL
// ═══════════════════════════════════════════════════════
function openClientModal(id){
  editingCid=id||null;
  document.getElementById('cmTitle').textContent=id?'Editar cliente':'Añadir cliente';
  if(id){
    const c=DB.clients.find(x=>x.id===id); if(!c) return;
    document.getElementById('cm-name').value=c.name;
    document.getElementById('cm-city').value=c.city;
    document.getElementById('cm-service').value=c.service;
    document.getElementById('cm-fee').value=c.fee;
    document.getElementById('cm-since').value=c.since;
    document.getElementById('cm-active').value=String(c.active);
  } else {
    ['cm-name','cm-city','cm-fee'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('cm-service').value='redes';
    document.getElementById('cm-since').value=curMid();
    document.getElementById('cm-active').value='true';
  }
  document.getElementById('clientModal').classList.add('open');
}
function closeClientModal(){document.getElementById('clientModal').classList.remove('open');}
function saveClient(){
  const data={
    name:document.getElementById('cm-name').value.trim(),
    city:document.getElementById('cm-city').value.trim(),
    service:document.getElementById('cm-service').value,
    fee:parseFloat(document.getElementById('cm-fee').value)||0,
    since:document.getElementById('cm-since').value,
    active:document.getElementById('cm-active').value==='true',
  };
  if(!data.name) return;
  if(editingCid){
    const idx=DB.clients.findIndex(c=>c.id===editingCid);
    if(idx>=0) DB.clients[idx]={...DB.clients[idx],...data};
  } else {
    DB.clients.push({id:DB.clients.reduce((m,c)=>Math.max(m,c.id),0)+1,...data});
  }
  saveDB(); closeClientModal();
  if(activePage==='sheet') renderSheet();
  else renderCliPage();
}

function setDashRange(n,el){
  dashRange=n;
  document.querySelectorAll('#page-dashboard .rtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); renderDashboard();
}
function getMonths(n){
  const s=sorted().filter(m=>m.brv>0||m.skool>0||m.exp>0);
  return (!n||n>=s.length)?s:s.slice(-n);
}
function renderDashboard(){
  const months=getMonths(dashRange);
  const tBrv=months.reduce((s,m)=>s+n(m.brv),0);
  const tSkool=months.reduce((s,m)=>s+n(m.skool),0);
  const tRev=tBrv+tSkool;
  const tExp=months.reduce((s,m)=>s+n(m.exp),0);
  const avgM=months.length?months.reduce((s,m)=>s+pct(n(m.brv)+n(m.skool),n(m.exp)),0)/months.length:0;
  const last=months[months.length-1];
  const prev=months[months.length-2];
  const delta=prev&&(n(prev.brv)+n(prev.skool))>0?((n(last.brv)+n(last.skool)-(n(prev.brv)+n(prev.skool)))/(n(prev.brv)+n(prev.skool))*100):0;
  const mrr=DB.clients.filter(c=>c.active).reduce((s,c)=>s+c.fee,0);

  document.getElementById('kpiRow').innerHTML=`
    <div class="kpi"><div class="kpi-lbl">Facturación total</div><div class="kpi-val" style="color:#4f46e5">${fmtN(tRev)} €</div><div class="kpi-d" style="color:#999">Período seleccionado</div></div>
    <div class="kpi"><div class="kpi-lbl">↳ BraveContent</div><div class="kpi-val" style="color:#4f46e5">${fmtN(tBrv)} €</div></div>
    <div class="kpi"><div class="kpi-lbl">↳ Skool</div><div class="kpi-val" style="color:#2563eb">${fmtN(tSkool)} €</div></div>
    <div class="kpi"><div class="kpi-lbl">Gastos</div><div class="kpi-val" style="color:#dc2626">${fmtN(tExp)} €</div></div>
    <div class="kpi"><div class="kpi-lbl">Neto</div><div class="kpi-val" style="color:#16a34a">${fmtN(tRev-tExp)} €</div></div>
    <div class="kpi"><div class="kpi-lbl">Margen medio</div><div class="kpi-val" style="color:#ea580c">${fmtP(avgM)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Último mes</div><div class="kpi-val">${fmtN(n(last?.brv)+n(last?.skool))} €</div><div class="kpi-d" style="color:${delta>=0?'#16a34a':'#dc2626'}">${delta>=0?'▲':'▼'} ${Math.abs(delta).toFixed(1)}%</div></div>
    <div class="kpi"><div class="kpi-lbl">MRR activo</div><div class="kpi-val" style="color:#4f46e5">${fmtN(mrr)} €</div><div class="kpi-d" style="color:#999">${DB.clients.filter(c=>c.active).length} clientes</div></div>
  `;

  if(charts.bar){charts.bar.destroy();}
  if(charts.line){charts.line.destroy();}

  const base={
    responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{font:{size:11},boxWidth:10,padding:10}},
      tooltip:{backgroundColor:'#1a1a1a',titleColor:'#fff',bodyColor:'#ddd',borderColor:'#333',borderWidth:1}},
    scales:{x:{ticks:{font:{size:10}},grid:{color:'#f5f5f5'}},
      y:{ticks:{font:{size:10},callback:v=>'€'+v.toLocaleString('es-ES')},grid:{color:'#f5f5f5'}}}
  };

  charts.bar=new Chart(document.getElementById('chartBar'),{
    type:'bar',
    data:{
      labels:months.map(m=>mlbl(m.id)),
      datasets:[
        {label:'BraveContent',data:months.map(m=>n(m.brv)),backgroundColor:'rgba(79,70,229,.75)',borderRadius:3,stack:'rev'},
        {label:'Skool',data:months.map(m=>n(m.skool)),backgroundColor:'rgba(37,99,235,.65)',borderRadius:3,stack:'rev'},
        {label:'Gastos',data:months.map(m=>n(m.exp)),backgroundColor:'rgba(220,38,38,.55)',borderRadius:3},
      ]
    },
    options:{...base,scales:{...base.scales,x:{...base.scales.x,stacked:true}}}
  });

  charts.line=new Chart(document.getElementById('chartLine'),{
    type:'line',
    data:{
      labels:months.map(m=>mlbl(m.id)),
      datasets:[{label:'Margen %',data:months.map(m=>+pct(n(m.brv)+n(m.skool),n(m.exp)).toFixed(1)),
        borderColor:'#ea580c',backgroundColor:'rgba(234,88,12,.08)',fill:true,tension:.4,pointRadius:3}]
    },
    options:{...base,scales:{x:{ticks:{font:{size:10}},grid:{color:'#f5f5f5'}},
      y:{min:0,max:80,ticks:{font:{size:10},callback:v=>v+'%'},grid:{color:'#f5f5f5'}}}}
  });

  // Table
  document.getElementById('dashTH').innerHTML=
    `<th>Mes</th><th class="r">BraveContent</th><th class="r">Skool</th><th class="r">Total</th><th class="r">Gastos</th><th class="r">Neto</th><th class="r">Margen</th><th class="r">Clientes</th>`;
  document.getElementById('dashTB').innerHTML=months.slice().reverse().map(m=>{
    const tot=n(m.brv)+n(m.skool), net=tot-n(m.exp), mg=pct(tot,n(m.exp));
    const mc=mg>=50?'#16a34a':mg>=40?'#ea580c':'#dc2626';
    return `<tr><td style="font-weight:700">${mlbl(m.id)}</td>
      <td class="r" style="color:#4f46e5">${fmtN(m.brv)} €</td>
      <td class="r" style="color:#2563eb">${n(m.skool)>0?fmtN(m.skool)+' €':'—'}</td>
      <td class="r" style="font-weight:700">${fmtN(tot)} €</td>
      <td class="r" style="color:#dc2626">${fmtN(m.exp)} €</td>
      <td class="r" style="color:#16a34a;font-weight:700">${fmtN(net)} €</td>
      <td class="r" style="color:${mc};font-weight:700">${fmtP(mg)}</td>
      <td class="r" style="color:#666">${m.clients||'—'}</td></tr>`;
  }).join('')+`<tr class="total-r">
    <td>TOTAL</td>
    <td class="r" style="color:#4f46e5">${fmtN(tBrv)} €</td>
    <td class="r" style="color:#2563eb">${fmtN(tSkool)} €</td>
    <td class="r">${fmtN(tRev)} €</td>
    <td class="r" style="color:#dc2626">${fmtN(tExp)} €</td>
    <td class="r" style="color:#16a34a">${fmtN(tRev-tExp)} €</td>
    <td class="r">${fmtP(avgM)}</td><td class="r">—</td></tr>`;
}

// ═══════════════════════════════════════════════════════
// CLIENTS PAGE
// ═══════════════════════════════════════════════════════
function monthDiff(a, b){
  if(!a||!b) return null;
  const [ay,am]=a.split('-').map(Number);
  const [by,bm]=b.split('-').map(Number);
  return (by-ay)*12+(bm-am)+1;
}
function renderCliPage(){
  const active=DB.clients.filter(c=>c.active);
  const inactive=DB.clients.filter(c=>!c.active&&c.since&&c.until);
  const mrr=active.reduce((s,c)=>s+c.fee,0);
  const tenures=inactive.map(c=>monthDiff(c.since,c.until)).filter(v=>v>0);
  const avgTenure=tenures.length?Math.round(tenures.reduce((s,v)=>s+v,0)/tenures.length):null;
  document.getElementById('cliKpi').innerHTML=`
    <div class="kpi"><div class="kpi-lbl">MRR</div><div class="kpi-val" style="color:#16a34a">${fmtN(mrr)} €</div></div>
    <div class="kpi"><div class="kpi-lbl">Clientes activos</div><div class="kpi-val" style="color:#4f46e5">${active.length}</div></div>
    <div class="kpi"><div class="kpi-lbl">Ticket medio</div><div class="kpi-val" style="color:#ea580c">€${active.length?Math.round(mrr/active.length):0}</div></div>
    <div class="kpi"><div class="kpi-lbl">Total cartera</div><div class="kpi-val">${DB.clients.length}</div></div>
    ${avgTenure!==null?`<div class="kpi"><div class="kpi-lbl">Permanencia media ex-clientes</div><div class="kpi-val" style="color:#7c3aed">${avgTenure} meses</div></div>`:''}
  `;
  const q=(document.getElementById('cliSearch')?.value||'').toLowerCase();
  const list=[...DB.clients].filter(c=>!q||c.name.toLowerCase().includes(q)||c.city.toLowerCase().includes(q))
    .sort((a,b)=>b.active-a.active||a.name.localeCompare(b.name));
  document.getElementById('cliBody').innerHTML=list.map(c=>`
    <tr style="border-bottom:1px solid #f5f5f5">
      <td style="padding:9px 12px;font-weight:${c.active?700:400};color:${c.active?'#1a1a1a':'#aaa'}">${c.name}</td>
      <td style="padding:9px 12px;color:#666;font-size:12px">${c.city}</td>
      <td style="padding:9px 12px">
        <span style="background:${c.service.includes('ads')?'#fff1f1':'#eef2ff'};color:${c.service.includes('ads')?'#dc2626':'#4f46e5'};border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600">${c.service}</span></td>
      <td style="padding:9px 12px;text-align:right;font-weight:700;color:#4f46e5">${fmtN(c.fee)} €</td>
      <td style="padding:9px 12px;color:#999;font-size:12px">${mlbl(c.since)}</td>
      <td style="padding:9px 12px">
        <span style="background:${c.active?'#f0fdf4':'#f9f9f9'};color:${c.active?'#16a34a':'#aaa'};border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600">${c.active?'Activo':'Inactivo'}</span></td>
      <td style="padding:9px 12px;display:flex;gap:6px">
        <button onclick="openClientModal(${c.id})" class="btn btn-g btn-sm">✏️ Editar</button>
        <button onclick="toggleActive(${c.id})" class="btn btn-sm" style="background:${c.active?'#fff1f1':'#f0fdf4'};color:${c.active?'#dc2626':'#16a34a'}">${c.active?'Desactivar':'Activar'}</button>
      </td>
    </tr>`).join('');
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
let tT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('show'),1500);
}

document.getElementById('clientModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeClientModal();});

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
loadDB();
renderSheet();
</script>
