<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7A1832"/>
      <stop offset="1" stop-color="#591427"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4D58D"/>
      <stop offset="0.5" stop-color="#E8B84B"/>
      <stop offset="1" stop-color="#B88824"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#A04060" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#591427" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" data-mode="unused"/>
    </filter>
  </defs>

  <!-- Fondo burdeos con esquinas redondeadas -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Glow interior -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#glow)"/>

  <!-- Marco dorado fino -->
  <rect x="28" y="28" width="456" height="456" rx="86" ry="86" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.85"/>

  <!-- Letra B elegante -->
  <g fill="url(#gold)" font-family="Poppins, Georgia, serif" font-weight="700">
    <text x="256" y="356" font-size="300" text-anchor="middle" letter-spacing="-8">B</text>
  </g>

  <!-- Detalle dorado: pequeño punto/acento -->
  <circle cx="256" cy="392" r="9" fill="url(#gold)"/>
  <!-- Línea decorativa bajo la B -->
  <rect x="186" y="406" width="140" height="6" rx="3" fill="url(#gold)" opacity="0.9"/>
</svg>